<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oikein</title>
<style>
  :root{
    --bg-top:#2b1f45;
    --bg-bottom:#120c1e;
    --shadow:#3a2f57;
    --text:#f4eefc;
    --accent:#ffcf5c;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom));
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    position:relative;
  }

  /* sunburst glow behind everything */
  .glow{
    position:absolute;
    top:50%;
    left:50%;
    width:120vmax;
    height:120vmax;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(255,207,92,0.35) 0%, rgba(255,207,92,0.08) 30%, rgba(255,207,92,0) 60%);
    animation:pulse 3s ease-in-out infinite;
    z-index:0;
  }
  @keyframes pulse{
    0%,100%{ transform:translate(-50%,-50%) scale(1); }
    50%{ transform:translate(-50%,-50%) scale(1.08); }
  }

  .rays{
    position:absolute;
    top:50%;
    left:50%;
    width:140vmax;
    height:140vmax;
    transform:translate(-50%,-50%);
    animation:spin 24s linear infinite;
    z-index:0;
    opacity:0.5;
  }
  .rays span{
    position:absolute;
    top:0;
    left:50%;
    width:3px;
    height:50%;
    background:linear-gradient(to top, rgba(255,207,92,0.35), transparent);
    transform-origin:bottom center;
  }
  @keyframes spin{
    to{ transform:translate(-50%,-50%) rotate(360deg); }
  }

  .confetti{
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    z-index:2;
    pointer-events:none;
  }
  .confetti span{
    position:absolute;
    top:-10%;
    width:8px;
    height:14px;
    animation:confetti-fall linear infinite;
  }
  @keyframes confetti-fall{
    0%{ transform:translateY(0) rotate(0deg); }
    100%{ transform:translateY(115vh) rotate(540deg); }
  }

  .scene{
    position:relative;
    z-index:3;
    text-align:center;
    padding:0 6vw;
    animation:rise 0.7s ease-out both;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(18px) scale(0.94); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .sun{
    width:70px;
    height:70px;
    margin:0 auto -4px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 40px 6px rgba(255,207,92,0.6);
    animation:bob 2.2s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-6px); }
  }

  .face{
    width:140px;
    height:140px;
    margin:14px auto 0;
    border-radius:50%;
    background:var(--accent);
    position:relative;
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
    animation:jump 1.1s ease-in-out infinite;
  }
  @keyframes jump{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    30%{ transform:translateY(-14px) rotate(-4deg); }
    50%{ transform:translateY(0) rotate(0deg); }
    70%{ transform:translateY(-6px) rotate(3deg); }
  }

  .eye{
    position:absolute;
    top:54px;
    width:10px;
    height:14px;
    background:#241a38;
    border-radius:50%;
    animation:blink 4.2s infinite;
  }
  .eye.left{ left:36px; }
  .eye.right{ right:36px; }
  @keyframes blink{
    0%,92%,100%{ transform:scaleY(1); }
    95%{ transform:scaleY(0.1); }
  }

  .cheek{
    position:absolute;
    top:68px;
    width:16px;
    height:9px;
    background:rgba(233,110,90,0.55);
    border-radius:50%;
  }
  .cheek.left{ left:20px; }
  .cheek.right{ right:20px; }

  .mouth{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:50px;
    height:24px;
    border:5px solid #241a38;
    border-top:none;
    border-radius:0 0 50px 50px;
    background:#241a38;
  }

  .sparkle{
    position:absolute;
    color:var(--accent);
    font-size:22px;
    animation:twinkle 1.6s ease-in-out infinite;
  }
  .sparkle.one{ top:6px; left:-10px; animation-delay:0.1s; }
  .sparkle.two{ top:20px; right:-16px; animation-delay:0.6s; }
  .sparkle.three{ bottom:10px; left:-20px; animation-delay:1.1s; }
  @keyframes twinkle{
    0%,100%{ opacity:0.2; transform:scale(0.8) rotate(0deg); }
    50%{ opacity:1; transform:scale(1.15) rotate(20deg); }
  }

  h1{
    margin:26px 0 6px;
    color:var(--text);
    font-size:clamp(1.6rem, 6vw, 2.8rem);
    font-weight:800;
    letter-spacing:-0.01em;
    line-height:1.15;
  }
</style>
</head>
<body>

<div class="glow"></div>
<div class="rays" id="rays"></div>
<div class="confetti" id="confetti"></div>

<div class="scene">
  <div class="sun"></div>
  <div class="face">
    <span class="sparkle one">✦</span>
    <span class="sparkle two">✦</span>
    <span class="sparkle three">✦</span>
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="cheek left"></div>
    <div class="cheek right"></div>
    <div class="mouth"></div>
  </div>

  <h1>Oikein!<br>Onneksi olkoon!</h1>
</div>

<script>
  // sun rays
  const rays = document.getElementById('rays');
  const rayCount = 24;
  for (let i = 0; i < rayCount; i++) {
    const r = document.createElement('span');
    r.style.transform = `rotate(${(360 / rayCount) * i}deg)`;
    rays.appendChild(r);
  }

  // confetti
  const confetti = document.getElementById('confetti');
  const colors = ['#ffcf5c', '#ff8fa3', '#7fd0ff', '#9be564', '#c99bff'];
  const pieces = 60;
  for (let i = 0; i < pieces; i++) {
    const c = document.createElement('span');
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2.2 + Math.random() * 2) + 's';
    c.style.animationDelay = (Math.random() * 2.5) + 's';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    confetti.appendChild(c);
  }
</script>

</body>
</html>
